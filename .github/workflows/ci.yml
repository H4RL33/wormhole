name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      WORMHOLE_DATABASE_URL: postgres://wormhole:wormhole@localhost:5432/wormhole?sslmode=disable
      WORMHOLE_INTEGRATION_REQUIRED: "1"
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: wormhole
          POSTGRES_PASSWORD: wormhole
          POSTGRES_DB: wormhole
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Run migrations up
        run: migrate -path migrations -database "postgres://wormhole:wormhole@localhost:5432/wormhole?sslmode=disable" up

      - name: Check formatting
        run: make fmt-check

      - name: Build
        run: make build

      - name: Cross-build unsupported wormholed target
        run: |
          GOOS=darwin GOARCH=arm64 go build -o /tmp/wormholed-darwin ./cmd/wormholed
          GOOS=darwin GOARCH=arm64 go test -c -o /tmp/wormholed-darwin.test ./cmd/wormholed

      - name: Vet
        run: make vet

      - name: Integration tests
        run: make integration

      - name: Race tests
        run: make race

      - name: Coverage
        run: make coverage

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Verify migrations down
        run: migrate -path migrations -database "postgres://wormhole:wormhole@localhost:5432/wormhole?sslmode=disable" down -all

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  contract-inventory:
    name: Contract Inventory
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Check alpha contract inventory
        run: sh .github/scripts/check-contract-manifest.sh

  static:
    name: Static
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: make fmt-check
      - name: Vet
        run: make vet

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Build
        run: make build
      - name: Cross-build unsupported gatewayd target
        run: |
          GOOS=darwin GOARCH=arm64 go build -o /tmp/gatewayd-darwin ./cmd/gatewayd
          GOOS=darwin GOARCH=arm64 go test -c -o /tmp/gatewayd-darwin.test ./cmd/gatewayd

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WORMHOLE_DATABASE_URL: postgres://wormhole:wormhole@localhost:5432/wormhole?sslmode=disable
      WORMHOLE_INTEGRATION_REQUIRED: "1"
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: wormhole
          POSTGRES_PASSWORD: wormhole
          POSTGRES_DB: wormhole
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.3
      - name: Run migrations
        run: migrate -path migrations -database "$WORMHOLE_DATABASE_URL" up
      - name: Integration tests
        run: make integration

  race:
    name: Race
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WORMHOLE_DATABASE_URL: postgres://wormhole:wormhole@localhost:5432/wormhole?sslmode=disable
      WORMHOLE_INTEGRATION_REQUIRED: "1"
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: wormhole
          POSTGRES_PASSWORD: wormhole
          POSTGRES_DB: wormhole
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.3
      - name: Run migrations
        run: migrate -path migrations -database "$WORMHOLE_DATABASE_URL" up
      - name: Race tests
        run: make race

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WORMHOLE_DATABASE_URL: postgres://wormhole:wormhole@localhost:5432/wormhole?sslmode=disable
      WORMHOLE_INTEGRATION_REQUIRED: "1"
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: wormhole
          POSTGRES_PASSWORD: wormhole
          POSTGRES_DB: wormhole
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.3
      - name: Run migrations
        run: migrate -path migrations -database "$WORMHOLE_DATABASE_URL" up
      - name: Coverage
        run: make coverage
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage.out

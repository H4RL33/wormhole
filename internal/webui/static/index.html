<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wormhole Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="text"] {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            padding: 8px 16px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #005a9e;
        }

        .error-banner {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .missing-key {
            background: #fef8e7;
            border: 1px solid #fce9d6;
            padding: 20px;
            border-radius: 4px;
            text-align: center;
        }

        .section {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #007acc;
            padding-bottom: 10px;
        }

        .board-columns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .task-column {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 15px;
        }

        .task-column h3 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .task-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .task-card p {
            font-size: 14px;
            margin: 5px 0;
        }

        .task-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .task-priority {
            font-size: 12px;
            color: #666;
        }

        .event-item {
            border-left: 3px solid #007acc;
            padding-left: 15px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .event-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .event-type {
            font-weight: 600;
            color: #007acc;
            font-size: 14px;
        }

        .event-time {
            font-size: 12px;
            color: #999;
            margin-top: 3px;
        }

        .event-note {
            margin-top: 8px;
            font-size: 14px;
            color: #555;
            font-style: italic;
        }

        .article-item {
            border-left: 3px solid #28a745;
            padding-left: 15px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .article-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .article-title {
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        .article-time {
            font-size: 12px;
            color: #999;
        }

        .empty-message {
            color: #999;
            font-style: italic;
            padding: 20px;
            text-align: center;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 14px;
        }

        .loading {
            color: #999;
            font-style: italic;
            padding: 20px;
            text-align: center;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #1e1e1e;
                color: #e0e0e0;
            }

            .section, header {
                background: #2d2d2d;
                border-color: #444;
            }

            .task-column {
                background: #383838;
                border-color: #444;
            }

            .task-card {
                background: #2d2d2d;
                border-color: #444;
            }

            .task-column h3 {
                color: #aaa;
                border-color: #444;
            }

            input[type="text"] {
                background: #383838;
                color: #e0e0e0;
                border-color: #444;
            }

            .missing-key {
                background: #3d3d20;
                border-color: #666633;
            }

            .error-message {
                background: #4d2626;
                border-color: #663333;
                color: #ff6b6b;
            }

            .event-time, .article-time {
                color: #888;
            }

            .empty-message, .loading {
                color: #888;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Wormhole Dashboard</h1>
            <div class="controls">
                <input type="text" id="projectInput" placeholder="Enter project ID" style="display: none;">
                <button id="loadBtn" onclick="loadProject()" style="display: none;">Load Project</button>
                <span id="currentProject" style="margin-left: 10px;"></span>
            </div>
        </header>

        <div id="keyWarning" class="missing-key" style="display: none;">
            Missing ?key=&lt;viewer-key&gt; in the URL. Cannot load dashboard without a valid viewer key.
        </div>

        <div id="dashboard" style="display: none;">
            <!-- Tasks Section -->
            <div class="section">
                <h2>Tasks</h2>
                <div id="tasksLoading" class="loading">Loading tasks...</div>
                <div id="tasksError" class="error-message" style="display: none;"></div>
                <div id="tasksBoard" class="board-columns" style="display: none;"></div>
            </div>

            <!-- Events Section -->
            <div class="section">
                <h2>Events</h2>
                <div id="eventsLoading" class="loading">Loading events...</div>
                <div id="eventsError" class="error-message" style="display: none;"></div>
                <div id="eventsFeed" style="display: none;"></div>
            </div>

            <!-- KB Section -->
            <div class="section">
                <h2>Knowledge Base</h2>
                <div id="kbLoading" class="loading">Loading articles...</div>
                <div id="kbError" class="error-message" style="display: none;"></div>
                <div id="kbList" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const viewerKey = urlParams.get('key');
        let projectId = urlParams.get('project');

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        function init() {
            if (!viewerKey) {
                document.getElementById('keyWarning').style.display = 'block';
                return;
            }

            document.getElementById('dashboard').style.display = 'block';

            if (!projectId) {
                document.getElementById('projectInput').style.display = 'inline-block';
                document.getElementById('loadBtn').style.display = 'inline-block';
            } else {
                loadProject();
            }
        }

        function loadProject() {
            if (!projectId && document.getElementById('projectInput').value) {
                projectId = document.getElementById('projectInput').value;
            }

            if (!projectId) {
                alert('Please enter a project ID');
                return;
            }

            document.getElementById('projectInput').style.display = 'none';
            document.getElementById('loadBtn').style.display = 'none';
            document.getElementById('currentProject').textContent = 'Project: ' + projectId;

            loadTasks();
            loadEvents();
            loadKB();
        }

        function getHeaders() {
            return {
                'Authorization': 'Bearer ' + viewerKey,
                'Content-Type': 'application/json'
            };
        }

        function loadTasks() {
            const url = '/dashboard/api/projects/' + projectId + '/tasks';

            fetch(url, { headers: getHeaders() })
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(text => {
                            try {
                                const err = JSON.parse(text);
                                throw new Error(err.error || 'Failed to load tasks');
                            } catch (e) {
                                throw new Error(`Request failed (status ${response.status})`);
                            }
                        });
                    }
                    return response.json();
                })
                .then(tasks => {
                    renderTasks(tasks || []);
                })
                .catch(error => {
                    document.getElementById('tasksLoading').style.display = 'none';
                    document.getElementById('tasksError').textContent = error.message;
                    document.getElementById('tasksError').style.display = 'block';
                });
        }

        function renderTasks(tasks) {
            document.getElementById('tasksLoading').style.display = 'none';

            const statuses = {
                'todo': [],
                'wip': [],
                'blocked': [],
                'done': [],
                'other': []
            };

            tasks.forEach(task => {
                if (statuses[task.Status] !== undefined) {
                    statuses[task.Status].push(task);
                } else {
                    statuses['other'].push(task);
                }
            });

            const board = document.getElementById('tasksBoard');
            board.innerHTML = '';

            Object.keys(statuses).forEach(status => {
                if (statuses[status].length > 0 || status !== 'other') {
                    const column = document.createElement('div');
                    column.className = 'task-column';

                    const title = document.createElement('h3');
                    title.textContent = status.toUpperCase();
                    column.appendChild(title);

                    if (statuses[status].length === 0) {
                        const empty = document.createElement('div');
                        empty.className = 'empty-message';
                        empty.textContent = 'No tasks';
                        column.appendChild(empty);
                    } else {
                        statuses[status].forEach(task => {
                            const card = document.createElement('div');
                            card.className = 'task-card';

                            const taskTitle = document.createElement('div');
                            taskTitle.className = 'task-title';
                            taskTitle.textContent = task.Title || '(Untitled)';
                            card.appendChild(taskTitle);

                            const priority = document.createElement('div');
                            priority.className = 'task-priority';
                            priority.textContent = 'Priority: ' + task.Priority;
                            card.appendChild(priority);

                            if (task.OwnerAgentID) {
                                const owner = document.createElement('div');
                                owner.className = 'task-priority';
                                owner.textContent = 'Owner: ' + task.OwnerAgentID;
                                card.appendChild(owner);
                            }

                            column.appendChild(card);
                        });
                    }
                    board.appendChild(column);
                }
            });

            board.style.display = 'grid';
        }

        function loadEvents() {
            const url = '/dashboard/api/projects/' + projectId + '/events';

            fetch(url, { headers: getHeaders() })
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(text => {
                            try {
                                const err = JSON.parse(text);
                                throw new Error(err.error || 'Failed to load events');
                            } catch (e) {
                                throw new Error(`Request failed (status ${response.status})`);
                            }
                        });
                    }
                    return response.json();
                })
                .then(events => {
                    renderEvents(events || []);
                })
                .catch(error => {
                    document.getElementById('eventsLoading').style.display = 'none';
                    document.getElementById('eventsError').textContent = error.message;
                    document.getElementById('eventsError').style.display = 'block';
                });
        }

        function renderEvents(events) {
            document.getElementById('eventsLoading').style.display = 'none';

            const feed = document.getElementById('eventsFeed');
            feed.innerHTML = '';

            if (events.length === 0) {
                feed.innerHTML = '<div class="empty-message">No events</div>';
            } else {
                events.forEach(event => {
                    const item = document.createElement('div');
                    item.className = 'event-item';

                    const type = document.createElement('div');
                    type.className = 'event-type';
                    type.textContent = event.EventType;
                    item.appendChild(type);

                    const time = document.createElement('div');
                    time.className = 'event-time';
                    time.textContent = formatDate(event.CreatedAt);
                    item.appendChild(time);

                    if (event.Note) {
                        const note = document.createElement('div');
                        note.className = 'event-note';
                        note.textContent = event.Note;
                        item.appendChild(note);
                    }

                    feed.appendChild(item);
                });
            }

            feed.style.display = 'block';
        }

        function loadKB() {
            const url = '/dashboard/api/projects/' + projectId + '/kb';

            fetch(url, { headers: getHeaders() })
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(text => {
                            try {
                                const err = JSON.parse(text);
                                throw new Error(err.error || 'Failed to load KB articles');
                            } catch (e) {
                                throw new Error(`Request failed (status ${response.status})`);
                            }
                        });
                    }
                    return response.json();
                })
                .then(articles => {
                    renderKB(articles || []);
                })
                .catch(error => {
                    document.getElementById('kbLoading').style.display = 'none';
                    document.getElementById('kbError').textContent = error.message;
                    document.getElementById('kbError').style.display = 'block';
                });
        }

        function renderKB(articles) {
            document.getElementById('kbLoading').style.display = 'none';

            const list = document.getElementById('kbList');
            list.innerHTML = '';

            if (articles.length === 0) {
                list.innerHTML = '<div class="empty-message">No articles</div>';
            } else {
                articles.forEach(article => {
                    const item = document.createElement('div');
                    item.className = 'article-item';

                    const title = document.createElement('div');
                    title.className = 'article-title';
                    title.textContent = article.Title || '(Untitled)';
                    item.appendChild(title);

                    const time = document.createElement('div');
                    time.className = 'article-time';
                    time.textContent = formatDate(article.CreatedAt);
                    item.appendChild(time);

                    list.appendChild(item);
                });
            }

            list.style.display = 'block';
        }

        // Initialize on page load
        window.addEventListener('load', init);
    </script>
</body>
</html>
